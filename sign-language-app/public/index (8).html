<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SignLang AI — A-Z + Words</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/hands.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/hand-pose-detection@2.0.1/dist/hand-pose-detection.js"></script>
  <style>
    :root{--bg:#07070f;--sf:#0f0f1b;--sf2:#16162a;--bd:#222238;--ac:#00f5a0;--ac2:#00d9f5;--wn:#f5a000;--dn:#f5004a;--pu:#a855f7;--tx:#e0e0f0;--td:#5a5a90;--glow:0 0 22px rgba(0,245,160,.35);--r:12px}
    .light{--bg:#f0f0f8;--sf:#fff;--sf2:#e6e6f4;--bd:#cccce6;--tx:#12122a;--td:#5050a0}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--tx);font-family:'Space Mono',monospace;min-height:100vh;overflow-x:hidden;transition:background .3s,color .3s}
    body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background-image:linear-gradient(rgba(0,245,160,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(0,245,160,.02) 1px,transparent 1px);background-size:40px 40px}
    #root{position:relative;z-index:1}
    /* HEADER */
    .hdr{display:flex;align-items:center;justify-content:space-between;padding:.9rem 1.6rem;border-bottom:1px solid var(--bd);background:rgba(7,7,15,.9);backdrop-filter:blur(16px);position:sticky;top:0;z-index:100}
    .light .hdr{background:rgba(240,240,248,.92)}
    .logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.3rem;letter-spacing:-.5px}
    .logo em{color:var(--ac);font-style:normal}
    .ltag{font-size:.55rem;background:var(--ac);color:#000;padding:2px 6px;border-radius:3px;margin-left:8px;vertical-align:middle;font-weight:700}
    .hdr-r{display:flex;align-items:center;gap:.6rem}
    .badge{font-size:.6rem;padding:2px 9px;border-radius:20px;border:1px solid var(--bd);color:var(--td);letter-spacing:1px}
    .badge.live{border-color:var(--ac);color:var(--ac);animation:pt 2s infinite}
    @keyframes pt{0%,100%{opacity:1}50%{opacity:.45}}
    .ibtn{background:var(--sf2);border:1px solid var(--bd);border-radius:7px;padding:5px 9px;cursor:pointer;color:var(--tx);font-size:.95rem;transition:all .2s}
    .ibtn:hover{border-color:var(--ac);color:var(--ac)}
    /* LAYOUT */
    .grid{display:grid;grid-template-columns:1fr 320px;gap:1.1rem;padding:1.1rem 1.6rem;max-width:1320px;margin:0 auto;align-items:start}
    @media(max-width:900px){.grid{grid-template-columns:1fr;padding:.9rem}}
    /* CAMERA */
    .cam{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden}
    .cam-hdr{padding:.75rem 1.1rem;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
    .cam-title{font-family:'Syne',sans-serif;font-weight:700;font-size:.68rem;letter-spacing:2.5px;text-transform:uppercase;color:var(--td)}
    .fps{font-size:.65rem;color:var(--ac);background:rgba(0,245,160,.1);padding:2px 7px;border-radius:4px;border:1px solid rgba(0,245,160,.2)}
    /* video: CSS scaleX(-1) to mirror | canvas: NO CSS transform
       MediaPipe flipHorizontal:true returns mirrored coords → canvas draws at those coords directly → perfect alignment */
    .vw{position:relative;width:100%;aspect-ratio:4/3;background:#000;overflow:hidden}
    .vw.on{box-shadow:inset 0 0 0 2px rgba(0,245,160,.18)}
    video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transform:scaleX(-1)}
    canvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
    .cn{position:absolute;width:20px;height:20px;z-index:5}
    .cn.tl{top:9px;left:9px;border-top:2px solid var(--ac);border-left:2px solid var(--ac);border-radius:2px 0 0 0}
    .cn.tr{top:9px;right:9px;border-top:2px solid var(--ac);border-right:2px solid var(--ac);border-radius:0 2px 0 0}
    .cn.bl{bottom:9px;left:9px;border-bottom:2px solid var(--ac);border-left:2px solid var(--ac);border-radius:0 0 0 2px}
    .cn.br{bottom:9px;right:9px;border-bottom:2px solid var(--ac);border-right:2px solid var(--ac);border-radius:0 0 2px 0}
    .hud{position:absolute;top:11px;left:50%;transform:translateX(-50%);background:rgba(0,245,160,.13);border:1px solid rgba(0,245,160,.4);border-radius:20px;padding:3px 13px;font-size:.58rem;color:var(--ac);letter-spacing:1px;z-index:10;backdrop-filter:blur(6px);white-space:nowrap}
    .idle{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(7,7,15,.92);z-index:20;gap:.9rem}
    .idle-ico{font-size:2.6rem;opacity:.4}
    .idle-tx{font-size:.72rem;color:var(--td);text-align:center;line-height:1.9;max-width:230px}
    .idle-tx strong{color:var(--tx)}
    .ctrl{padding:.8rem 1.1rem;display:flex;gap:.65rem;align-items:center;border-top:1px solid var(--bd);flex-wrap:wrap}
    .btn-go{flex:1;min-width:140px;padding:.65rem 1.2rem;background:var(--ac);color:#000;border:none;border-radius:7px;font-family:'Space Mono',monospace;font-size:.72rem;font-weight:700;cursor:pointer;transition:all .2s;letter-spacing:1px}
    .btn-go:hover{box-shadow:var(--glow);transform:translateY(-1px)}
    .btn-go.stop{background:var(--dn)}.btn-go.stop:hover{box-shadow:0 0 22px rgba(245,0,74,.4)}
    .btn-go:disabled{opacity:.38;cursor:not-allowed;transform:none;box-shadow:none}
    .btn-s{padding:.65rem .9rem;background:var(--sf2);border:1px solid var(--bd);border-radius:7px;color:var(--tx);font-family:'Space Mono',monospace;font-size:.68rem;cursor:pointer;transition:all .2s}
    .btn-s:hover{border-color:var(--ac2);color:var(--ac2)}
    /* RIGHT PANELS */
    .rp{display:flex;flex-direction:column;gap:.85rem}
    .card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden}
    .card-hdr{padding:.72rem 1rem;border-bottom:1px solid var(--bd);font-family:'Syne',sans-serif;font-size:.65rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--td);display:flex;align-items:center;justify-content:space-between}
    .sg{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--bd)}
    .si{background:var(--sf);padding:.68rem .9rem}
    .sl{font-size:.56rem;color:var(--td);letter-spacing:1px;text-transform:uppercase;margin-bottom:2px}
    .sv{font-size:.76rem;font-weight:700}
    .ok{color:var(--ac)}.wn{color:var(--wn)}.of{color:var(--td)}
    /* PREDICTION */
    .pw{padding:1.1rem .9rem;text-align:center}
    .ps{font-family:'Syne',sans-serif;font-size:5rem;font-weight:800;line-height:1;display:block;min-height:6rem}
    .ps.alpha{color:var(--ac);filter:drop-shadow(0 0 20px rgba(0,245,160,.55))}
    .ps.word{color:var(--pu);filter:drop-shadow(0 0 20px rgba(168,85,247,.55))}
    .ps.pop{animation:pop .16s ease}
    @keyframes pop{0%{transform:scale(.6)}60%{transform:scale(1.1)}100%{transform:scale(1)}}
    .pd{font-size:.65rem;color:var(--td);margin-top:.2rem;letter-spacing:1.5px;min-height:.9rem}
    .mb{font-size:.52rem;padding:2px 8px;border-radius:10px;margin-bottom:.3rem;display:inline-block}
    .mb.alpha{background:rgba(0,245,160,.12);color:var(--ac);border:1px solid rgba(0,245,160,.3)}
    .mb.word{background:rgba(168,85,247,.12);color:var(--pu);border:1px solid rgba(168,85,247,.3)}
    .cbar-w{margin-top:.7rem}
    .cbar{height:4px;background:var(--sf2);border-radius:3px;overflow:hidden}
    .cfill{height:100%;border-radius:3px;transition:width .2s}
    .cfill.alpha{background:linear-gradient(90deg,var(--ac2),var(--ac))}
    .cfill.word{background:linear-gradient(90deg,#a855f7,#d946ef)}
    .clbls{display:flex;justify-content:space-between;font-size:.58rem;color:var(--td);margin-top:3px}
    .hbar-w{margin-top:.55rem}
    .hbar{height:4px;background:var(--sf2);border-radius:2px;overflow:hidden}
    .hfill{height:100%;background:var(--wn);border-radius:2px;transition:width .1s linear}
    .hlbl{font-size:.56rem;color:var(--wn);margin-top:2px;text-align:center}
    /* SENTENCE */
    .sd{padding:.8rem 1rem;min-height:52px;font-size:1.1rem;font-family:'Syne',sans-serif;letter-spacing:1px;line-height:1.6;word-break:break-all}
    .cur{display:inline-block;width:2px;height:1em;background:var(--ac);margin-left:2px;vertical-align:middle;animation:bl 1s infinite}
    @keyframes bl{0%,100%{opacity:1}50%{opacity:0}}
    .sbtns{padding:.6rem .9rem;display:flex;gap:.35rem;border-top:1px solid var(--bd)}
    .sbtns button{flex:1;padding:.4rem .25rem;font-size:.6rem;font-family:'Space Mono',monospace;background:var(--sf2);border:1px solid var(--bd);border-radius:5px;color:var(--tx);cursor:pointer;transition:all .2s}
    .sbtns button:hover{border-color:var(--ac2);color:var(--ac2)}
    .sbtns button:disabled{opacity:.3;cursor:not-allowed}
    /* HISTORY */
    .hist{padding:.6rem;display:flex;flex-wrap:wrap;gap:.35rem;max-height:100px;overflow-y:auto}
    .hc{padding:2px 8px;background:var(--sf2);border:1px solid var(--bd);border-radius:20px;font-size:.68rem;color:var(--td)}
    .hc.na{border-color:var(--ac);color:var(--ac);background:rgba(0,245,160,.07)}
    .hc.nw{border-color:var(--pu);color:var(--pu);background:rgba(168,85,247,.07)}
    /* BOTTOM */
    .bot{padding:0 1.6rem 2rem;max-width:1320px;margin:0 auto}
    .tabs{display:flex;border-bottom:1px solid var(--bd)}
    .tab{flex:1;padding:.55rem .4rem;font-size:.6rem;font-family:'Space Mono',monospace;background:none;border:none;cursor:pointer;color:var(--td);border-bottom:2px solid transparent;transition:all .2s;letter-spacing:.5px}
    .tab.active{color:var(--ac);border-bottom-color:var(--ac)}
    .tab.wt.active{color:var(--pu);border-bottom-color:var(--pu)}
    .az-grid{padding:.7rem .9rem;display:grid;grid-template-columns:repeat(auto-fill,minmax(50px,1fr));gap:.35rem}
    .az-chip{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--sf2);border:1px solid var(--bd);border-radius:8px;cursor:default;transition:all .18s;gap:1px}
    .azl{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800;line-height:1}
    .azs{font-size:.4rem;color:var(--td);font-family:'Space Mono',monospace;text-align:center}
    .az-chip.hit{border-color:var(--ac);background:rgba(0,245,160,.13);box-shadow:var(--glow);transform:scale(1.08)}
    .az-chip.hit .azl{color:var(--ac)}
    .wg{padding:.75rem .9rem;display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:.5rem}
    .wc{padding:.7rem .5rem;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--sf2);border:1px solid var(--bd);border-radius:10px;cursor:default;transition:all .18s;gap:4px}
    .wc-ico{font-size:1.6rem}
    .wc-name{font-family:'Syne',sans-serif;font-size:.7rem;font-weight:700}
    .wc-hint{font-size:.5rem;color:var(--td);text-align:center;line-height:1.4;max-width:100px}
    .wc.hit{border-color:var(--pu);background:rgba(168,85,247,.12);box-shadow:0 0 20px rgba(168,85,247,.3)}
    .wc.hit .wc-name{color:var(--pu)}
    .ref-grid{padding:.75rem 1rem;display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:.28rem .9rem}
    .ref-row{display:flex;gap:.5rem;font-size:.58rem;line-height:1.6;align-items:baseline}
    .ref-key{color:var(--ac);font-family:'Syne',sans-serif;font-weight:700;min-width:20px;flex-shrink:0}
    .ref-val{color:var(--td)}
    /* LOADING / TOAST */
    .lbar{height:3px;background:var(--sf2);overflow:hidden}
    .lfill{height:100%;width:35%;background:linear-gradient(90deg,var(--ac2),var(--ac));animation:ls 1.4s ease-in-out infinite}
    @keyframes ls{0%{transform:translateX(-160%)}100%{transform:translateX(380%)}}
    .toast{position:fixed;bottom:1.4rem;left:50%;transform:translateX(-50%);background:var(--sf);border:1px solid var(--ac);border-radius:7px;padding:.5rem 1.1rem;font-size:.7rem;color:var(--ac);z-index:999;animation:ti .22s ease;box-shadow:var(--glow);white-space:nowrap}
    @keyframes ti{from{opacity:0;transform:translate(-50%,7px)}to{opacity:1;transform:translate(-50%,0)}}
    ::-webkit-scrollbar{width:4px}
    ::-webkit-scrollbar-track{background:var(--sf)}
    ::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}
  </style>
</head>
<body><div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ═══════════════════════════════════════════
//  GEOMETRY HELPERS
// ═══════════════════════════════════════════
const TIP_SET = new Set([4,8,12,16,20]);
const d2 = (a,b)=>Math.sqrt((a.x-b.x)**2+(a.y-b.y)**2);
const palmSz = lm=>Math.max(d2(lm[0],lm[9]),0.001);

function jAng(A,B,C){
  const ax=A.x-B.x,ay=A.y-B.y,cx=C.x-B.x,cy=C.y-B.y;
  const dot=ax*cx+ay*cy, mag=Math.sqrt(ax*ax+ay*ay)*Math.sqrt(cx*cx+cy*cy);
  return mag<1e-6?180:Math.acos(Math.max(-1,Math.min(1,dot/mag)))*180/Math.PI;
}

// ═══════════════════════════════════════════
//  FEATURE EXTRACTION
// ═══════════════════════════════════════════
function feat(lm){
  const ps = palmSz(lm);

  // Finger extension: tip clearly above PIP
  const ix = lm[8].y  < lm[6].y  - 0.01;
  const mi = lm[12].y < lm[10].y - 0.01;
  const ri = lm[16].y < lm[14].y - 0.01;
  const pi = lm[20].y < lm[18].y - 0.01;

  // Thumb: lateral x-spread (works for L, Y — thumb going sideways)
  const th = Math.abs(lm[4].x-lm[0].x)/ps > Math.abs(lm[3].x-lm[0].x)/ps*1.12;

  // Thumb vertical direction
  const thUp   = lm[4].y < lm[0].y - 0.08;
  const thDown = lm[4].y > lm[0].y + 0.04;

  // Thumb pointing upward: tip above its own IP joint
  const thPU = lm[4].y < lm[3].y - 0.01;

  // PIP joint angles  (MCP→PIP→TIP): ~170°=straight, ~90°=curled
  const ixAng = jAng(lm[5],lm[6],lm[8]);
  const miAng = jAng(lm[9],lm[10],lm[12]);

  // Hooked index: bent but not fully extended (used for X)
  const ixHook = ixAng>50 && ixAng<155 && !ix;

  // Normalized tip distances
  const ps4 = ps*4;
  const d_ti = d2(lm[4],lm[8])/ps;
  const d_tm = d2(lm[4],lm[12])/ps;
  const d_im = d2(lm[8],lm[12])/ps;
  const d_mr = d2(lm[12],lm[16])/ps;
  const d_rp = d2(lm[16],lm[20])/ps;

  // Average distance all 4 finger-tips → thumb tip (O-detection)
  const avgTT = (d2(lm[4],lm[8])+d2(lm[4],lm[12])+d2(lm[4],lm[16])+d2(lm[4],lm[20]))/ps4;

  // Tip-lift: how far each finger tip is ABOVE its own MCP (normalized)
  // Large positive → finger pointing UP; near 0 → horizontal; negative → curled
  const ixLift = (lm[5].y -lm[8].y) /ps;
  const miLift = (lm[9].y -lm[12].y)/ps;

  // Is tip above its MCP? (C-shape partial curl check)
  const ixAMCP = lm[8].y  < lm[5].y;
  const miAMCP = lm[12].y < lm[9].y;

  // K: thumb tip x is between index MCP x and middle MCP x
  const minX = Math.min(lm[5].x,lm[9].x);
  const maxX = Math.max(lm[5].x,lm[9].x);
  const thBtw = lm[4].x > minX-0.06 && lm[4].x < maxX+0.06;

  return {ps,ix,mi,ri,pi,th,thUp,thDown,thPU,thBtw,ixHook,ixAng,miAng,d_ti,d_tm,d_im,d_mr,d_rp,avgTT,ixLift,miLift,ixAMCP,miAMCP};
}

// ═══════════════════════════════════════════
//  CLASSIFIER
//  mode        — 'alpha' | 'words'
//  motionDelta — wrist Y change over 20 frames (positive = hand moved down)
//  handCount   — number of hands detected
// ═══════════════════════════════════════════
function classify(lm, mode, motionDelta=0, handCount=1){
  if(!lm||lm.length<21) return null;
  const f = feat(lm);
  const {ix,mi,ri,pi,th,thUp,thDown,thPU,thBtw,ixHook,ixAng,d_ti,d_tm,d_im,d_mr,d_rp,avgTT,ixLift,miLift,ixAMCP,miAMCP} = f;

  const open  = ix&&mi&&ri&&pi;
  const close = !ix&&!mi&&!ri&&!pi;
  const lm4=lm[4],lm6=lm[6],lm8=lm[8],lm10=lm[10],lm14=lm[14];

  // Is hand near face/chin level? (wrist in top 65% of frame)
  const nearFace = lm[0].y < 0.65;

  // ── WORDS ────────────────────────────────
  if(mode==='words'){

    // THANK YOU:
    //   Method 1 — Motion: flat open palm moving DOWN from chin
    //     motionDelta > 0.035 = wrist moved down >3.5% of frame over 20 frames
    //     AND hand starts near face (nearFace)
    //     AND hand is open (all 4 fingers extended)
    //   Method 2 — Two hands: both hands open simultaneously
    const palmOpen = open && th;
    const tyMotion  = palmOpen && nearFace && motionDelta > 0.035;
    const tyTwoHand = handCount >= 2 && palmOpen;
    if(tyMotion || tyTwoHand)
      return {sign:'🙏',label:'THANK YOU', confidence: tyTwoHand?0.91:0.86, group:'words'};

    // HELLO: open hand, NOT performing Thank You motion
    if(open && th && motionDelta <= 0.035)
      return {sign:'✋',label:'HELLO',     confidence:0.86,group:'words'};

    // YES / NO
    if(th&&close&&thUp)
      return {sign:'👍',label:'YES',       confidence:0.93,group:'words'};
    if(th&&close&&thDown)
      return {sign:'👎',label:'NO',        confidence:0.91,group:'words'};

    // OK
    if(!ix&&(mi||ri||pi)&&d_ti<0.45)
      return {sign:'👌',label:'OK',        confidence:0.85,group:'words'};

    // ILY
    if(th&&ix&&!mi&&!ri&&pi)
      return {sign:'🤟',label:'I LOVE YOU',confidence:0.90,group:'words'};

    // SORRY: closed fist, thumb extended SIDEWAYS (not pointing up like YES).
    // FIX: use th&&close&&!thUp — thumb IS laterally extended (th=true) but
    // NOT way above wrist (thUp=false). YES has thUp=true so it fires first.
    // SORRY thumb is beside the fist, not raised high.
    if(th&&close&&!thUp)
      return {sign:'🙇',label:'SORRY',      confidence:0.80,group:'words'};

    if(open) return {sign:'✋',label:'HELLO',confidence:0.74,group:'words'};
    return {sign:'?',confidence:0.05,label:'Show a word gesture',group:'none'};
  }

  // ── ALPHA ────────────────────────────────

  // ══ FULLY CLOSED ════════════════════════
  if(close){
    const avgPIP = (lm6.y+lm10.y+lm14.y)/3;

    // O (allClose path): all fingers AND thumb curl inward forming a circle.
    // MediaPipe reads fully-curled O fingers as allClose=true (tips below PIP).
    // avgTT=0.224 confirmed by trace — all tips cluster very close to thumb tip.
    // Must be FIRST in this block before M/E/S steal it.
    if(avgTT < 0.38)
      return {sign:'O',label:'ASL O', confidence:0.86,group:'alpha'};

    // C (allClose path): fingers curl but don't fully close — avgTT moderate.
    // Some real-world C gestures have ALL fingers reading as closed.
    if(avgTT >= 0.38 && avgTT < 0.72 && d_ti > 0.25)
      return {sign:'C',label:'ASL C', confidence:0.80,group:'alpha'};

    // M: thumb tip IS BELOW avg finger PIPs (thumb tucked under folded fingers)
    if(!th && lm4.y > avgPIP+0.01 && d_ti<0.50)
      return {sign:'M',label:'ASL M', confidence:0.80,group:'alpha'};

    // N: like M but shallower — thumb under index+middle only
    if(!th && lm4.y > (lm6.y+lm10.y)/2+0.01 && d_ti<0.45)
      return {sign:'N',label:'ASL N', confidence:0.78,group:'alpha'};

    // T: thumb pokes UP between index+middle fingers
    if(thPU && thBtw && d_ti<0.42)
      return {sign:'T',label:'ASL T', confidence:0.79,group:'alpha'};

    // E: fingers tightly hooked, tips near thumb
    if(!th && ixAng<110 && d_ti<0.55)
      return {sign:'E',label:'ASL E', confidence:0.79,group:'alpha'};

    // A: thumb beside fist, pointing up
    if(thPU && !thBtw)
      return {sign:'A',label:'ASL A', confidence:0.83,group:'alpha'};

    // S: fist, thumb wraps over knuckles
    if(!th && lm4.y >= lm6.y-0.05)
      return {sign:'S',label:'ASL S', confidence:0.80,group:'alpha'};

    return {sign:'A',label:'ASL A/S',confidence:0.65,group:'alpha'};
  }

  // ══ PARTIAL CURL — O and C ══════════════
  // All fingers curled inward (none extended past PIP)
  if(!ix&&!mi&&!ri&&!pi){
    // O: all tips converge on thumb tip — tight circle
    if(avgTT < 0.30)
      return {sign:'O',label:'ASL O', confidence:0.84,group:'alpha'};
    // C: tips spread in open arc, at least some partial opening
    if(avgTT>=0.28 && (ixAMCP||miAMCP))
      return {sign:'C',label:'ASL C', confidence:0.82,group:'alpha'};
    // F (partial): thumb+index touch
    if(d_ti<0.42)
      return {sign:'F',label:'ASL F', confidence:0.79,group:'alpha'};
  }

  // ══ X — hooked index ═══════════════════
  if(ixHook&&!mi&&!ri&&!pi)
    return {sign:'X',label:'ASL X', confidence:0.79,group:'alpha'};

  // ══ SINGLE FINGER UP ═══════════════════

  // D: index up, thumb pinches middle tip
  if(ix&&!mi&&!ri&&!pi&&d_tm<0.42)
    return {sign:'D',label:'ASL D', confidence:0.84,group:'alpha'};

  // I / J: pinky only
  if(!th&&!ix&&!mi&&!ri&&pi)
    return {sign:'I',label:'ASL I/J',confidence:0.88,group:'alpha'};

  // P/Q: index+thumb but hand points downward
  if(th&&ix&&!mi&&!ri&&!pi&&lm8.y>lm[5].y+0.02)
    return {sign:'P',label:'ASL P/Q',confidence:0.76,group:'alpha'};

  // G: index+thumb sideways
  if(th&&ix&&!mi&&!ri&&!pi&&Math.abs(lm8.x-lm[5].x)/f.ps>0.38)
    return {sign:'G',label:'ASL G',  confidence:0.80,group:'alpha'};

  // L: index up + thumb sideways = L shape
  if(th&&ix&&!mi&&!ri&&!pi)
    return {sign:'L',label:'ASL L',  confidence:0.87,group:'alpha'};

  // Y: thumb + pinky
  if(th&&!ix&&!mi&&!ri&&pi)
    return {sign:'Y',label:'ASL Y',  confidence:0.90,group:'alpha'};

  // ══ TWO FINGERS UP ══════════════════════

  // K: index+middle up + thumb WEDGED BETWEEN them (thumb tip x between MCP x values) + pointing up
  if(ix&&mi&&!ri&&!pi&&thPU&&thBtw)
    return {sign:'K',label:'ASL K',  confidence:0.83,group:'alpha'};

  // O: index+middle up but ALL tips curling TOWARD thumb (avgTT very small).
  // Trace confirmed: O shows ix=true,mi=true,ri=false,pi=false with avgTT≈0.27.
  // Must be checked BEFORE R because both land in this same finger-state branch.
  if(ix&&mi&&!ri&&!pi&&avgTT<0.32)
    return {sign:'O',label:'ASL O',  confidence:0.85,group:'alpha'};

  // R: index+middle CROSSED — both up, very close together.
  // FIX: removed !th guard — thumb detection is unreliable when fingers cross.
  // The tight d_im<0.22 is the key discriminant. avgTT is large (≈0.90) so
  // the O rule (avgTT<0.32) above will NOT steal R.
  if(ix&&mi&&!ri&&!pi&&d_im<0.22)
    return {sign:'R',label:'ASL R',  confidence:0.83,group:'alpha'};

  // U vs H vs V (same finger state: index+middle, no others)
  if(ix&&mi&&!ri&&!pi&&!thBtw){
    // V: fingers clearly spread
    if(d_im>0.22)
      return {sign:'V',label:'ASL V', confidence:0.87,group:'alpha'};
    // U: fingers together AND pointing up (ixLift large)
    if(ixLift>0.22&&miLift>0.22)
      return {sign:'U',label:'ASL U', confidence:0.84,group:'alpha'};
    // H: fingers together AND horizontal (ixLift near zero)
    if(ixLift<0.12&&miLift<0.12)
      return {sign:'H',label:'ASL H', confidence:0.81,group:'alpha'};
    // Ambiguous — lean toward U
    return {sign:'U',label:'ASL U/H',confidence:0.70,group:'alpha'};
  }

  // ══ THREE FINGERS UP ════════════════════

  // W: index+middle+ring, pinky down
  if(!th&&ix&&mi&&ri&&!pi)
    return {sign:'W',label:'ASL W',  confidence:0.84,group:'alpha'};

  // F (full): middle/ring/pinky extended, thumb+index touching
  if(mi&&ri&&pi&&!ix&&d_ti<0.42)
    return {sign:'F',label:'ASL F',  confidence:0.83,group:'alpha'};

  // ══ FOUR / FIVE ══════════════════════════

  // B: all 4 up, close together, no thumb
  if(!th&&open&&d_im<0.30&&d_mr<0.28)
    return {sign:'B',label:'ASL B',  confidence:0.84,group:'alpha'};

  // 4: all 4 up, spread
  if(!th&&open)
    return {sign:'4',label:'ASL 4',  confidence:0.80,group:'alpha'};

  // C: trace confirmed C has ALL 4 fingers semi-extended (reads as allOpen=true)
  // with thumb out. avgTT moderate (0.35-0.70) — fingertips curve toward thumb.
  // Open/5 hand has avgTT > 0.90. Threshold raised to 0.72 for real-world variance.
  if(th&&open&&avgTT<0.72)
    return {sign:'C',label:'ASL C',  confidence:0.82,group:'alpha'};

  // 5: all 5
  if(th&&open)
    return {sign:'5',label:'ASL 5',  confidence:0.84,group:'alpha'};

  return {sign:'?',confidence:0.05,label:'Unknown',group:'none'};
}

// ═══════════════════════════════════════════
//  CANVAS DRAWING
// ═══════════════════════════════════════════
const CONNS=[[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[0,9],[9,10],[10,11],[11,12],[0,13],[13,14],[14,15],[15,16],[0,17],[17,18],[18,19],[19,20],[5,9],[9,13],[13,17]];
function drawHand(ctx,lm,W,H){
  ctx.lineCap='round';
  CONNS.forEach(([a,b])=>{
    ctx.strokeStyle=(a<=4||b<=4)?'rgba(0,217,245,.9)':'rgba(0,245,160,.75)';
    ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(lm[a].x*W,lm[a].y*H);ctx.lineTo(lm[b].x*W,lm[b].y*H);ctx.stroke();
  });
  lm.forEach((p,i)=>{
    const x=p.x*W,y=p.y*H,tip=TIP_SET.has(i);
    ctx.beginPath();ctx.arc(x,y,tip?7:4,0,Math.PI*2);
    if(tip){const g=ctx.createRadialGradient(x,y,0,x,y,7);g.addColorStop(0,'#fff');g.addColorStop(.4,'#00f5a0');g.addColorStop(1,'rgba(0,245,160,.04)');ctx.fillStyle=g;}
    else ctx.fillStyle='#00d9f5';
    ctx.fill();ctx.strokeStyle='rgba(0,0,0,.5)';ctx.lineWidth=1;ctx.stroke();
  });
}

const AZ = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
const WORDS_DATA=[
  {sign:'✋',key:'HELLO',    emoji:'✋',hint:'Open hand, fingers spread'},
  {sign:'🙏',key:'THANKYOU', emoji:'🙏',hint:'Move flat open palm DOWN from chin — or show BOTH hands open'},
  {sign:'👍',key:'YES',      emoji:'👍',hint:'Closed fist, thumb up'},
  {sign:'👎',key:'NO',       emoji:'👎',hint:'Closed fist, thumb down'},
  {sign:'👌',key:'OK',       emoji:'👌',hint:'Thumb+index touch, others up'},
  {sign:'🤟',key:'ILY',      emoji:'🤟',hint:'Thumb+index+pinky out'},
  {sign:'🙇',key:'SORRY',    emoji:'🙇',hint:'Closed A-fist, rub circle on chest'},
];
const REF=[

  ['X','Index finger hooked/crooked, others closed'],

  ['🙇','Closed A-fist (thumb beside), rub in circle on chest'],
];
const MIN_CONF=0.60, HOLD_MS=1800;

// ═══════════════════════════════════════════
//  APP
// ═══════════════════════════════════════════
function App(){
  const videoRef=useRef(null), canvasRef=useRef(null), detector=useRef(null);
  const rafId=useRef(null), lastSign=useRef(''), holdTimer=useRef(null);
  const holdStart=useRef(0), fpsCount=useRef(0), lastFpsT=useRef(Date.now()), speechRef=useRef(false);
  // tabRef: RAF loop reads this live — no stale closure
  const tabRef = useRef('alpha');
  // motionBuf: ring-buffer of last 20 wrist-Y values for Thank You motion detection
  const motionBuf = useRef([]);
  // inferring: lock flag — prevents overlapping async estimateHands calls (fixes glitchy landmarks)
  const inferring = useRef(false);

  const [running,  setRunning]  = useState(false);
  const [loading,  setLoading]  = useState(false);
  const [ready,    setReady]    = useState(false);
  const [dark,     setDark]     = useState(true);
  const [pred,     setPred]     = useState(null);
  const [sentence, setSentence] = useState('');
  const [history,  setHistory]  = useState([]);
  const [fps,      setFps]      = useState(0);
  const [handsN,   setHandsN]   = useState(0);
  const [toast,    setToast]    = useState('');
  const [speechEn, setSpeechEn] = useState(false);
  const [holdPct,  setHoldPct]  = useState(0);
  const [curSign,  setCurSign]  = useState('');
  const [tab,      setTab]      = useState('alpha');
  const [motionVal,setMotionVal]= useState(0);

  useEffect(()=>{ speechRef.current=speechEn; },[speechEn]);
  useEffect(()=>{ document.documentElement.className=dark?'':'light'; },[dark]);

  const setTabSync = useCallback(t=>{ tabRef.current=t; setTab(t); lastSign.current=''; clearTimeout(holdTimer.current); setHoldPct(0); setPred(null); setCurSign(''); motionBuf.current=[]; setMotionVal(0); },[]);

  const toast$=useCallback(m=>{ setToast(m); setTimeout(()=>setToast(''),2800); },[]);

  // ── Load model ──────────────────────────
  useEffect(()=>{
    (async()=>{
      setLoading(true);
      try{
        toast$('Loading MediaPipe Hands…');
        await tf.setBackend('webgl'); await tf.ready();
        detector.current=await handPoseDetection.createDetector(
          handPoseDetection.SupportedModels.MediaPipeHands,
          {runtime:'mediapipe',solutionPath:'https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915',modelType:'lite',maxHands:2}
        );
        setReady(true); toast$('✓ Ready — click START DETECTION');
      }catch(e){ console.error(e); toast$('⚠ Model failed. Check console.'); }
      setLoading(false);
    })();
  },[]); // eslint-disable-line

  // ── Detection loop ──────────────────────
  // KEY FIXES vs previous version:
  //  1. inferring lock: prevents overlapping async estimateHands calls
  //     which caused landmark flicker / ghost hands / stale canvas draws.
  //     If the previous frame's inference hasn't finished, we skip that frame.
  //  2. motionBuf: 20-frame wrist-Y ring buffer for Thank You motion detection
  //  3. Two-hand support: draws all detected hands, classifies dominant hand
  const runLoop = useCallback(()=>{
    const loop = ()=>{
      rafId.current = requestAnimationFrame(loop);

      const v=videoRef.current, c=canvasRef.current;
      if(!v||!c||!detector.current||v.readyState<2) return;
      if(inferring.current) return; // skip frame — previous inference still running

      const W=v.videoWidth||640, H=v.videoHeight||480;
      if(c.width!==W){ c.width=W; c.height=H; }

      // FPS
      fpsCount.current++;
      const now=Date.now();
      if(now-lastFpsT.current>=1000){ setFps(fpsCount.current); fpsCount.current=0; lastFpsT.current=now; }

      // Lock — set before async work, released in finally
      inferring.current = true;
      detector.current.estimateHands(v,{flipHorizontal:true})
        .then(hands=>{
          const ctx=c.getContext('2d');
          ctx.clearRect(0,0,W,H);
          setHandsN(hands.length);

          if(hands.length>0){
            // Draw ALL hands (up to 2)
            hands.forEach(hand=>{
              const pts=hand.keypoints.map(kp=>({x:kp.x/W,y:kp.y/H,z:kp.z??0}));
              drawHand(ctx,pts,W,H);
            });

            // Classify dominant (first) hand
            const lm=hands[0].keypoints.map(kp=>({x:kp.x/W,y:kp.y/H,z:kp.z??0}));

            // Motion buffer — track wrist Y over last 20 frames
            const buf=motionBuf.current;
            buf.push(lm[0].y);
            if(buf.length>20) buf.shift();
            // positive motionDelta = hand moved DOWN in frame (chin→outward = Thank You)
            const motionDelta = buf.length>=10 ? buf[buf.length-1]-buf[0] : 0;
            setMotionVal(motionDelta);

            const r=classify(lm, tabRef.current, motionDelta, hands.length);
            if(!r||r.confidence<MIN_CONF){
              setPred({sign:'?',confidence:r?.confidence??0,label:'Hold a clearer gesture',group:'none'});
              setCurSign('');
              if(lastSign.current!=='?'){ lastSign.current='?'; clearTimeout(holdTimer.current); setHoldPct(0); }
            } else {
              setPred(r); setCurSign(r.sign);
              if(r.sign!==lastSign.current){
                lastSign.current=r.sign; holdStart.current=Date.now(); setHoldPct(0); clearTimeout(holdTimer.current);
                holdTimer.current=setTimeout(()=>{
                  setSentence(s=>s+r.sign);
                  setHistory(h=>[{sign:r.sign,group:r.group},...h].slice(0,50));
                  setHoldPct(100);
                  if(speechRef.current&&window.speechSynthesis){
                    window.speechSynthesis.cancel();
                    const u=new SpeechSynthesisUtterance(r.label); u.rate=0.9; window.speechSynthesis.speak(u);
                  }
                },HOLD_MS);
              } else {
                setHoldPct(Math.min(((Date.now()-holdStart.current)/HOLD_MS)*100,99));
              }
            }
          } else {
            const ctx2=c.getContext('2d'); ctx2.clearRect(0,0,W,H);
            setPred(null); setCurSign(''); lastSign.current='';
            clearTimeout(holdTimer.current); setHoldPct(0);
            motionBuf.current=[]; setMotionVal(0);
          }
        })
        .catch(()=>{})
        .finally(()=>{ inferring.current=false; });
    };
    rafId.current = requestAnimationFrame(loop);
  },[]);

  // ── Camera ──────────────────────────────
  const startCam=async()=>{
    try{
      const s=await navigator.mediaDevices.getUserMedia({video:{width:{ideal:640},height:{ideal:480},facingMode:'user',frameRate:{ideal:30,max:30}},audio:false});
      videoRef.current.srcObject=s; await videoRef.current.play(); setRunning(true); runLoop();
    }catch(e){ toast$('⚠ Camera denied. Check permissions.'); }
  };
  const stopCam=()=>{
    cancelAnimationFrame(rafId.current); clearTimeout(holdTimer.current);
    if(videoRef.current?.srcObject){ videoRef.current.srcObject.getTracks().forEach(t=>t.stop()); videoRef.current.srcObject=null; }
    const c=canvasRef.current; if(c) c.getContext('2d').clearRect(0,0,c.width,c.height);
    setRunning(false); setPred(null); setHandsN(0); setFps(0); setHoldPct(0); setCurSign(''); lastSign.current=''; inferring.current=false; motionBuf.current=[]; setMotionVal(0);
  };
  const toggle=()=>running?stopCam():startCam();
  const speak$=()=>{ if(!sentence||!window.speechSynthesis) return; window.speechSynthesis.cancel(); window.speechSynthesis.speak(new SpeechSynthesisUtterance(sentence)); };

  const confPct=pred?Math.round(pred.confidence*100):0;
  const showConf=pred&&pred.confidence>=MIN_CONF&&pred.sign!=='?';
  const isWord=pred?.group==='words';

  return(
    <>
      <header className="hdr">
        <div className="logo">Sign<em>Lang</em> AI<span className="ltag">A–Z</span></div>
        <div className="hdr-r">
          <div className={`badge${running?' live':''}`}>{running?'● LIVE':'○ IDLE'}</div>
          <button className="ibtn" onClick={()=>{ setSpeechEn(e=>{ toast$(!e?'🔊 Speech ON':'🔇 Speech OFF'); return !e; }); }}>{speechEn?'🔊':'🔇'}</button>
          <button className="ibtn" onClick={()=>setDark(d=>!d)}>{dark?'☀️':'🌙'}</button>
        </div>
      </header>
      {loading&&<div className="lbar"><div className="lfill"/></div>}

      <div className="grid">
        {/* Camera */}
        <div className="cam">
          <div className="cam-hdr"><span className="cam-title">Camera Feed</span><span className="fps">{running?`${fps} FPS`:'— FPS'}</span></div>
          <div className={`vw${running?' on':''}`}>
            <div className="cn tl"/><div className="cn tr"/><div className="cn bl"/><div className="cn br"/>
            {running&&handsN>0&&<div className="hud">{handsN>=2?'👐 BOTH HANDS':'✋ HAND DETECTED'}</div>}
            <video ref={videoRef} muted playsInline/>
            <canvas ref={canvasRef}/>
            {!running&&(<div className="idle"><div className="idle-ico">🖐</div><div className="idle-tx">Camera is off.<br/>Click <strong>START DETECTION</strong>.<br/><span style={{fontSize:'.65rem',opacity:.6}}>Allow camera when prompted.</span></div></div>)}
          </div>
          <div className="ctrl">
            <button className={`btn-go${running?' stop':''}`} onClick={toggle} disabled={loading||!ready}>
              {loading?'⏳ LOADING…':running?'⏹ STOP':'▶ START DETECTION'}
            </button>
            <button className="btn-s" onClick={()=>{ setSentence(''); setHistory([]); lastSign.current=''; clearTimeout(holdTimer.current); setHoldPct(0); toast$('Cleared'); }}>CLEAR</button>
          </div>
        </div>

        {/* Right */}
        <div className="rp">
          <div className="card">
            <div className="card-hdr">Status</div>
            <div className="sg">
              {[['Model',ready?'READY':loading?'LOADING':'OFFLINE',ready?'ok':loading?'wn':'of'],['Camera',running?'ACTIVE':'OFF',running?'ok':'of'],['Hands',`${handsN} FOUND`,handsN>0?'ok':'of'],['Mode',tab==='alpha'?'A–Z':'WORDS','ok']].map(([l,v,c])=>(
                <div key={l} className="si"><div className="sl">{l}</div><div className={`sv ${c}`}>{v}</div></div>
              ))}
            </div>
          </div>

          <div className="card">
            <div className="card-hdr"><span>Live Prediction</span><span style={{color:'var(--wn)',fontSize:'.58rem'}}>HOLD {HOLD_MS/1000}s</span></div>
            <div className="pw">
              {showConf&&<span className={`mb ${isWord?'word':'alpha'}`}>{isWord?'WORD':'ALPHABET'}</span>}
              <span className={`ps ${isWord?'word':'alpha'} pop`} key={pred?.sign}>
                {showConf?pred.sign:running?'🖐':'—'}
              </span>
              <div className="pd">{showConf?pred.label:running?'Show a hand gesture':'Camera offline'}</div>
              {showConf&&(<div className="cbar-w"><div className="cbar"><div className={`cfill ${isWord?'word':'alpha'}`} style={{width:`${confPct}%`}}/></div><div className="clbls"><span>Confidence</span><span>{confPct}%</span></div></div>)}
              {showConf&&(<div className="hbar-w"><div className="hbar"><div className="hfill" style={{width:`${holdPct}%`}}/></div><div className="hlbl">{holdPct>=99?'✓ Captured!':`Hold… ${Math.round(holdPct)}%`}</div></div>)}
            </div>
          </div>

          <div className="card">
            <div className="card-hdr"><span>Sentence Builder</span><button style={{background:'none',border:'none',fontFamily:'Space Mono,monospace',fontSize:'.62rem',cursor:sentence?'pointer':'not-allowed',color:sentence?'var(--ac)':'var(--td)'}} onClick={speak$} disabled={!sentence}>🔊 SPEAK</button></div>
            <div className="sd">{sentence||<span style={{color:'var(--td)',fontSize:'.74rem'}}>Captured signs appear here…</span>}{running&&<span className="cur"/>}</div>
            <div className="sbtns"><button onClick={()=>setSentence(s=>s.slice(0,-1))} disabled={!sentence}>⌫</button><button onClick={()=>setSentence(s=>s+' ')}>SPC</button><button onClick={()=>setSentence('')} disabled={!sentence}>CLR</button></div>
          </div>

          <div className="card">
            <div className="card-hdr">History</div>
            <div className="hist">
              {history.length===0?<span style={{color:'var(--td)',fontSize:'.65rem'}}>Nothing captured yet</span>
                :history.map((h,i)=><div key={i} className={`hc${i===0?(h.group==='words'?' nw':' na'):''}`}>{h.sign}</div>)}
            </div>
          </div>
        </div>
      </div>

      <div className="bot">
        <div className="card">
          <div className="tabs">
            <button className={`tab${tab==='alpha'?' active':''}`} onClick={()=>setTabSync('alpha')}>🔤 A–Z ALPHABET</button>
            <button className={`tab wt${tab==='words'?' active':''}`} onClick={()=>setTabSync('words')}>💬 WORDS & PHRASES</button>
          </div>
          {tab==='alpha'&&(
            <div className="az-grid">
              {AZ.map(L=>{
                const hit = curSign===L || (pred?.sign?.includes('/')&&pred.sign.includes(L));
                return(<div key={L} className={`az-chip${hit?' hit':''}`} title={`ASL ${L}`}><span className="azl">{L}</span><span className="azs">ASL</span></div>);
              })}
            </div>
          )}
          {tab==='words'&&(
            <>
              {running&&(
                <div style={{padding:'.55rem 1rem .3rem',borderBottom:'1px solid var(--bd)'}}>
                  <div style={{display:'flex',justifyContent:'space-between',fontSize:'.55rem',color:'var(--td)',marginBottom:'4px'}}>
                    <span>HAND MOTION ↓ (for THANK YOU)</span>
                    <span style={{color:motionVal>0.035?'var(--pu)':handsN>=2?'var(--pu)':'var(--td)',fontWeight:'bold'}}>
                      {handsN>=2?'👐 BOTH HANDS':motionVal>0.035?'▼ MOVING DOWN':motionVal<-0.03?'▲ MOVING UP':'● STILL'}
                    </span>
                  </div>
                  <div style={{height:'4px',background:'var(--sf2)',borderRadius:'3px',overflow:'hidden'}}>
                    <div style={{
                      height:'100%',
                      width:`${Math.min(Math.abs(motionVal)*600,100)}%`,
                      background:motionVal>0.035||handsN>=2?'var(--pu)':motionVal<-0.03?'var(--ac2)':'var(--bd)',
                      borderRadius:'3px',transition:'width .08s,background .15s'
                    }}/>
                  </div>
                </div>
              )}
              <div className="wg">
                {WORDS_DATA.map(({sign,key,emoji,hint})=>(
                  <div key={key} className={`wc${curSign===sign?' hit':''}`}>
                    <span className="wc-ico">{emoji}</span>
                    <span className="wc-name">{key==='THANKYOU'?'THANK YOU':key}</span>
                    <span className="wc-hint">{hint}</span>
                  </div>
                ))}
              </div>
            </>
          )}
        </div>
        <div className="card" style={{marginTop:'.8rem'}}>
          <div className="card-hdr">Hand Shape Reference</div>
          <div className="ref-grid">
            {REF.map(([k,v])=><div key={k} className="ref-row"><span className="ref-key">{k}</span><span className="ref-val">{v}</span></div>)}
          </div>
        </div>
      </div>

      {toast&&<div className="toast">{toast}</div>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
